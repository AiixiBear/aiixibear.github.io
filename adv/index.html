<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>untitled</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            z-index: 10;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .text {
            color: #555;
            font-size: 18px;
            font-weight: 500;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            opacity: 0; /* 初始隱藏 */
            z-index: 5;
        }

        /* 偽裝啟動後的樣式 */
        .show-video iframe {
            opacity: 1;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <div class="text">正在驗證您的安全性環境，請稍候...</div>
    </div>

    <iframe 
        id="rick-frame"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=0&modestbranding=1" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>

    <script>
        // 設定 3 秒後突然變臉！
        setTimeout(() => {
            document.body.classList.add('show-video');
            // 如果可以的話，這裡可以試著調整靜音，但瀏覽器通常會攔截自動播放的聲音
            // 所以建議讓使用者點擊一下畫面來啟動「安全性確認」
        }, 3000);
    </script>

</body>
</html>
