<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>untitled</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #313131;
        }

        .container {
            max-width: 600px;
            width: 90%;
            text-align: left;
        }

        h1 { font-size: 32px; font-weight: 500; margin-bottom: 10px; }
        p { font-size: 16px; color: #666; }

        .loading-box {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fafafa;
        }

        .status-item {
            margin: 10px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .status-item::before {
            content: "✓";
            margin-right: 10px;
            color: #2ecc71;
            font-weight: bold;
            opacity: 0;
        }

        .status-item.active::before { opacity: 1; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #eee;
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #0051c3;
            transition: width 0.5s ease;
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: 0;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <h1>請稍候...</h1>
        <p>正在檢查連線是否安全。此過程可能需要幾秒鐘。</p>
        
        <div class="loading-box">
            <div class="status-item" id="step1">正在檢查瀏覽器資訊...</div>
            <div class="status-item" id="step2">正在驗證 IP 位址安全性...</div>
            <div class="status-item" id="step3">正在進行加密隧道連線...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
        </div>
        
        <p style="font-size: 13px; margin-top: 20px;">
            <span id="">aiixibear.run.place</span><br>
            瀏覽器版本: <span id="1">N</span>
        </p>
    </div>

    <iframe 
        id="rick-frame"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>

    <script>
        // 抓取一些假資訊讓畫面更真
        document.getElementById('1').innerText = navigator.userAgent.split(' ')[0];

        const steps = ['step1', 'step2', 'step3'];
        const progress = document.getElementById('progress');
        let currentStep = 0;

        function runCheck() {
            if (currentStep < steps.length) {
                document.getElementById(steps[currentStep]).classList.add('active');
                currentStep++;
                progress.style.width = (currentStep * 33) + '%';
                setTimeout(runCheck, 1500); // 每一項檢查跑 1.5 秒
            } else {
                // 檢查完成！變臉啟動！
                progress.style.width = '100%';
                setTimeout(() => {
                    document.getElementById('rick-frame').style.display = 'block';
                }, 500);
            }
        }

        // 啟動檢查
        window.onload = runCheck;
    </script>

</body>
</html>
